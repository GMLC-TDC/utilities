# C/C++ with GCC
# Build your C/C++ project with GCC using make.
# Add steps that publish test results, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/c-cpp/gcc
# copied from https://github.com/CLIUtils/CLI11

trigger:
  - main

pr:
  - main

variables:
  utilities.std: 20
  utilities.build_type: Debug
  utilities.options: -DGMLC_UTILITIES_BUILD_TESTS=ON -DGMLC_UTILITIES_ENABLE_ERROR_ON_WARNINGS=ON
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  - job: ClangTidy
    variables:
      CXX_FLAGS: '-Werror -Wcast-align -Wfloat-equal -Wimplicit-atomic-properties -Wmissing-declarations -Woverlength-strings -Wshadow -Wstrict-selector-match -Wundeclared-selector -Wunreachable-code -std=c++23'
      utilities.options: -DGMLC_UTILITIES_CLANG_TIDY=ON -DGMLC_UTILITIES_CLANG_TIDY_OPTIONS="-fix"
      utilities.std: 23
      CMAKE_BUILD_PARALLEL_LEVEL: 1
    pool:
      vmImage: 'ubuntu-latest'
    container: helics/buildenv:clang22-builder
    steps:
      - template: .ci/azure-build.yml
      - script: git diff --exit-code --color
        displayName: Check tidy

  - job: CppLint
    variables:
      utilities.options:
    pool:
      vmImage: 'ubuntu-latest'
    container: helics/buildenv:cpplint
    steps:
      - bash: cpplint --counting=detailed --recursive gmlc tests benchmarks
        displayName: Checking against google style guide

  - job: Native
    strategy:
      matrix:
        Linux20:
          vmImage: 'ubuntu-latest'
        XCode-latest:
          utilities.std: 23
          vmImage: 'macOS-15'
        XCode-oldest:
          test_config: 'ci'
          vmImage: 'macOS-14'
        Windowslatest:
          vmImage: 'windows-latest'
          utilities.std: 20
    pool:
      vmImage: $(vmImage)
    steps:
      - template: .ci/azure-build.yml
      - template: .ci/azure-test.yml

  - job: Windows
    strategy:
      matrix:
        Windows20:
          vmImage: 'windows-latest'
          utilities.std: 23
          vsArch: 'x64'
        Windows17:
          vmImage: 'windows-2022'
          vsArch: 'Win32'

    pool:
      vmImage: $(vmImage)
      vsArch: $(vsArch)
    steps:
      - template: .ci/azure-build.yml
      - template: .ci/azure-test.yml

  - job: Docker
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      matrix:
        gcc14:
          containerImage: helics/buildenv:gcc14-builder
        gcc15:
          containerImage: helics/buildenv:gcc15-builder
          utilities.std: 26
        gcc12:
          containerImage: helics/buildenv:gcc12-builder
          utilities.std: 23
        clang19:
          containerImage: helics/buildenv:clang19-builder
        clang22:
          containerImage: helics/buildenv:clang22-builder
          utilities.std: 26
        clang14:
          containerImage: helics/buildenv:clang15-builder
          utilities.std: 23
    container: $[ variables['containerImage'] ]
    steps:
      - template: .ci/azure-build.yml
      - template: .ci/azure-test.yml
